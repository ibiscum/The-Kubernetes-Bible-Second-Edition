# sidecar.yaml
apiVersion: v1
kind: Pod
metadata:
  name: sidecar
spec:
  containers:
    - name: myapp
      image: alpine:3.23
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 100m
          memory: 200Mi
      imagePullPolicy: IfNotPresent
      command: ['sh', '-c', 'while true; do echo "$(date): logging" >> /opt/logs.txt; sleep 2; done']
      volumeMounts:
        - name: log-volume
          mountPath: /opt
  initContainers:
    - name: logshipper
      image: alpine:3.23
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 100m
          memory: 200Mi
      imagePullPolicy: IfNotPresent
      restartPolicy: Always
      command: ['sh', '-c', 'tail -F /opt/logs.txt']
      volumeMounts:
        - name: log-volume
          mountPath: /opt

  volumes:
    - name: log-volume
      emptyDir: {}
