# nginx-with-basic-init-container.yaml
apiVersion: v1
kind: Pod
metadata:
  name: nginx-with-init-container
spec:
  restartPolicy: Never
  initContainers:
    - name: my-init-container
      image: debian:13.4-slim
      command: ["sleep", "5"]
  containers:
    - name: nginx-container
      image: nginx:1.29.6
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          cpu: 100m
          memory: 200Mi
      imagePullPolicy: IfNotPresent
