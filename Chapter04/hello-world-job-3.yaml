# hello-world-job-3.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: hello-world-job-3
  namespace: kubernetes-bible

spec:
  backoffLimit: 3
  completions: 10
  template:
    metadata:
      name: hello-world-job-3
    spec:
      restartPolicy: OnFailure
      containers:
        - name: hello-world-container
          image: busybox:1.36.1
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 200Mi
          command: ["/bin/sh", "-c"]
          args: ["echo 'Hello world'; sleep 3"]
