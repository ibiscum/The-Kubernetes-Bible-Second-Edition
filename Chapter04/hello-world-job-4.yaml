# hello-world-job-4.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: hello-world-job-4
spec:
  backoffLimit: 3
  parallelism: 5
  template:
    metadata:
      name: hello-world-job-4
      namespace: default
    spec:
      restartPolicy: OnFailure
      containers:
        - name: hello-world-container
          image: busybox:1.36.1
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 200Mi
          command: ["/bin/sh", "-c"]
          args: ["echo 'Hello world'; sleep 3"]
